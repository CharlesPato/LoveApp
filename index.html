<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Love 💖</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Comic Sans MS', cursive, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      z-index: 10;
    }

    h1 {
      font-size: 3rem;
      color: #fff;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
      transition: all 0.5s ease;
    }

    button {
      padding: 15px 40px;
      font-size: 1.3rem;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      margin: 20px;
    }

    #yesBtn {
      background-color: #ff4d6d;
      color: white;
    }

    #noBtn {
      background-color: #444;
      color: white;
      position: absolute;
    }

    .love {
      position: absolute;
      bottom: -40px;
      font-size: 2rem;
      animation: floatUp linear forwards;
      pointer-events: none;
      opacity: 0.9;
    }

    @keyframes floatUp {
      0% {
        transform: translateX(0) translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateX(var(--drift)) translateY(-100vh) scale(1.6);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1 id="question" width:"300px">To My Crush: Will you be my girlfriend? 💖</h1>
    <button id="yesBtn">YES 😍</button>
    <button id="noBtn">NO 🙄</button>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const question = document.getElementById("question");

    const loves = ["❤️","💖","💘","💕","😍","🥰","😘"];

    // NO button runs away 😏
    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
      const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    // YES button
    yesBtn.addEventListener("click", () => {
      question.innerText = "I love you more ❤️";
      yesBtn.style.display = "none";
      noBtn.style.display = "none";

      setInterval(() => {
        createLove();
      }, 120);
    });

    function createLove() {
      const love = document.createElement("div");
      love.className = "love";
      love.innerText = loves[Math.floor(Math.random() * loves.length)];

      love.style.left = Math.random() * window.innerWidth + "px";

      const duration = 3 + Math.random() * 2;
      const drift = (Math.random() * 200 - 100) + "px";

      love.style.animationDuration = duration + "s";
      love.style.setProperty("--drift", drift);

      document.body.appendChild(love);

      setTimeout(() => {
        love.remove();
      }, duration * 1000);
    }
  </script>

</body>
</html>
